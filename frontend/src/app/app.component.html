<div class="app-wrapper">
  <!-- Background decorative elements -->
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>

  <!-- Header -->
  <header class="app-header">
    <div class="container">
      <div class="header-content">
        <div class="logo-section">
          <div class="logo-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="5 3 19 12 5 21 5 3"></polygon>
            </svg>
          </div>
          <div>
            <h1 class="logo-text">YouTube Summarizer</h1>
            <p class="logo-tagline">AI-Powered Video Analysis</p>
          </div>
        </div>
        <div class="header-badge">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path>
          </svg>
          Powered by Gemini
        </div>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="app-main">
    <div class="container">
      <!-- URL Input Section -->
      <section class="section-input" id="input-section">
        <app-url-input (summarizeRequested)="onSummarize($event)"></app-url-input>
      </section>

      <!-- Error Message -->
      @if (errorMessage()) {
        <div class="error-banner animate-fade-in-up">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="15" y1="9" x2="9" y2="15"></line>
            <line x1="9" y1="9" x2="15" y2="15"></line>
          </svg>
          {{ errorMessage() }}
        </div>
      }

      <!-- Loading State -->
      @if (isLoading()) {
        <div class="loading-section animate-fade-in">
          <div class="glass-card p-5 text-center">
            <div class="spinner-glow mx-auto mb-3"></div>
            <p class="loading-text">Analyzing video content...</p>
            <p class="loading-hint">This may take a moment depending on video length</p>
          </div>
        </div>
      }

      <!-- Video Summary Section -->
      @if (videoData()) {
        <section class="section-summary" id="summary-section">
          <app-video-summary [videoData]="videoData()!"></app-video-summary>
        </section>
      }

      <!-- Chat Section -->
      <section class="section-chat" id="chat-section">
        <app-chat
          [videoId]="videoData()?.videoId || ''"
          [videoTitle]="videoData()?.title || ''"
        ></app-chat>
      </section>
    </div>
  </main>

  <!-- Footer -->
  <footer class="app-footer">
    <div class="container">
      <p>Built with Angular &amp; Gemini AI &bull; YouTube Video Summarizer</p>
    </div>
  </footer>
</div>
