<div class="url-input-wrapper animate-fade-in-up">
  <div class="glass-card p-4">
    <div class="input-header mb-3">
      <div class="icon-badge">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="5 3 19 12 5 21 5 3"></polygon>
        </svg>
      </div>
      <div>
        <h2 class="input-title">Summarize a YouTube Video</h2>
        <p class="input-subtitle">Paste a YouTube link to get an AI-powered summary with key topics and timestamps</p>
      </div>
    </div>

    <div class="input-row">
      <div class="input-field-wrapper">
        <input
          id="youtube-url-input"
          type="url"
          class="form-control form-control-dark"
          placeholder="https://www.youtube.com/watch?v=..."
          [ngModel]="url()"
          (ngModelChange)="url.set($event)"
          (keydown.enter)="onSubmit()"
          [disabled]="isLoading()"
        />
        @if (url().length > 0 && !isValidUrl) {
          <div class="validation-msg">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="12" y1="8" x2="12" y2="12"></line>
              <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
            Enter a valid YouTube URL
          </div>
        }
      </div>

      <button
        id="summarize-btn"
        class="btn-gradient summarize-btn"
        [disabled]="!isValidUrl || isLoading()"
        (click)="onSubmit()"
      >
        @if (isLoading()) {
          <span class="spinner-border spinner-border-sm me-2" role="status"></span>
          Analyzing...
        } @else {
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="me-2">
            <path d="M12 20h9"></path>
            <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
          </svg>
          Summarize
        }
      </button>
    </div>
  </div>
</div>
